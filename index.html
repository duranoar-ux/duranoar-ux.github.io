<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursos ONE AIR</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0f2744;
    --navy2: #1a3a5c;
    --blue: #2d6a9f;
    --sky: #4a9fd4;
    --green: #2e7d32;
    --gray: #f5f5f3;
    --gray2: #e8e8e4;
    --text: #1a1a18;
    --text2: #5a5a56;
    --text3: #8a8a84;
    --white: #ffffff;
    --radius: 10px;
    --radius-lg: 14px;
  }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #f0ede8;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .wrap { max-width: 760px; width: 100%; }
  .hero {
    background: var(--navy);
    color: white;
    border-radius: var(--radius-lg);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }
  .hero::before { content:''; position:absolute; right:-60px; top:-60px; width:220px; height:220px; background: rgba(255,255,255,0.04); border-radius:50%; }
  .hero::after { content:''; position:absolute; left:-40px; bottom:-60px; width:180px; height:180px; background: rgba(255,255,255,0.03); border-radius:50%; }
  .hero-inner { position: relative; z-index: 2; }
  .logo { height: 56px; width: auto; margin-bottom: 1.25rem; }
  .hero h1 { font-size: 22px; font-weight: 600; letter-spacing: 0.01em; margin-bottom: 6px; }
  .hero p { font-size: 14px; color: rgba(255,255,255,0.75); }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 560px) { .cards { grid-template-columns: 1fr; } }
  .card {
    display: block;
    background: var(--white);
    border: 1px solid var(--gray2);
    border-radius: var(--radius-lg);
    padding: 1.75rem 1.5rem;
    text-decoration: none;
    color: var(--text);
    transition: all 0.15s;
    position: relative;
  }
  .card:hover {
    border-color: var(--blue);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(15,39,68,0.10);
  }
  .card-num {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--navy); color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; font-family: 'DM Mono', monospace;
    margin-bottom: 14px;
  }
  .card h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .card p { font-size: 13px; color: var(--text3); line-height: 1.5; margin-bottom: 14px; }
  .card-cta {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: var(--blue);
  }
  .card-cta svg { transition: transform 0.15s; }
  .card:hover .card-cta svg { transform: translateX(3px); }
  .footer { text-align: center; margin-top: 1.5rem; font-size: 12px; color: var(--text3); }
</style>
</head>
